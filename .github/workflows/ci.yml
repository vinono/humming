name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Package Entry Smoke Test
        run: bun run test:entry

      - name: Consumer Smoke Test
        run: bun run test:consumer

      - name: Examples Smoke Test
        run: bun run test:examples

      - name: Test
        run: bun test
